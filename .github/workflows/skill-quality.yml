name: Skill Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-skill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run skill structure validation
        run: bash scripts/validate-skill-md.sh

  install-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shell: [bash, zsh]
        tool: [claude, codex, amp, gemini, opencode]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure zsh is available
        run: |
          if ! command -v zsh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y zsh
          fi

      - name: Run installer smoke tests
        run: ${{ matrix.shell }} -lc "bash scripts/test-install-smoke.sh ${{ matrix.tool }}"

  validate-marketplace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate marketplace plugin
        run: bash scripts/validate-marketplace-plugin.sh

  sync-check:
    runs-on: ubuntu-latest
    needs: [validate-skill, validate-marketplace]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Check version sync
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          SKILL_VERSION=$(sed -n 's/^version:[[:space:]]*//p' skills/design-farmer/SKILL.md | head -1 | tr -d '[:space:]')
          PLUGIN_VERSION=$(node -p "require('./.claude-plugin/plugin.json').version")
          MP_VERSION=$(node -p "require('./.claude-plugin/marketplace.json').metadata.version")

          MISMATCH=0
          if [[ "$PKG_VERSION" != "$SKILL_VERSION" ]]; then
            echo "Version mismatch: package.json ($PKG_VERSION) != SKILL.md ($SKILL_VERSION)"
            MISMATCH=1
          fi
          if [[ "$PKG_VERSION" != "$PLUGIN_VERSION" ]]; then
            echo "Version mismatch: package.json ($PKG_VERSION) != plugin.json ($PLUGIN_VERSION)"
            MISMATCH=1
          fi
          if [[ "$PKG_VERSION" != "$MP_VERSION" ]]; then
            echo "Version mismatch: package.json ($PKG_VERSION) != marketplace.json ($MP_VERSION)"
            MISMATCH=1
          fi

          if [[ "$MISMATCH" -eq 1 ]]; then
            exit 1
          fi

          echo "All versions synced: $PKG_VERSION"
