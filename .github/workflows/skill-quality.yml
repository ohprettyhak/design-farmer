name: Skill Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-skill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run skill structure validation
        run: bash scripts/validate-skill-md.sh

      - name: Run semantic consistency suite
        run: bash skills/design-farmer/tests/run-all.sh

  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin to a specific LTS minor so Node point releases cannot
      # spontaneously break CI without a commit in this repository.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18'

      # Pin the Claude Code CLI to the current minor series so an upstream
      # release with tighter schema enforcement cannot break unrelated PRs
      # without a commit in this repository. Dependabot (see .github/dependabot.yml)
      # keeps the pin moving via scheduled PRs.
      - name: Install Claude Code CLI
        run: npm install -g "@anthropic-ai/claude-code@~2.1.0"

      - name: Validate plugin and marketplace manifests
        run: claude plugin validate .

  install-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shell: [bash, zsh]
        tool: [claude, codex, amp, gemini, opencode]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure zsh is available
        run: |
          if ! command -v zsh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y zsh
          fi

      - name: Run installer smoke tests
        run: ${{ matrix.shell }} -lc "bash scripts/test-install-smoke.sh ${{ matrix.tool }}"
